<nav xmlns:th="http://www.thymeleaf.org"
     th:fragment="menu_helper"
     class="cabecalho-site"
     aria-label="Navegação principal">
    <div class="cabecalho-site__wrap">
        <a class="marca" href="/" aria-label="Página inicial">
            <span class="marca__simbolo">E</span>
            <span class="marca__texto">
                <span class="marca__titulo">Escadas Munarim</span>
            </span>
        </a>

        <div class="navegacao">
            <a th:each="modulo : ${modulos}"
               th:href="@{${modulo.url}}"
               th:text="${modulo.nome}"></a>
        </div>
    </div>
</nav>
