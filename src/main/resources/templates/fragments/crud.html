<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<section th:fragment="crudList(modulo, parametros, linhas)"
         class="pagina">

  <header class="pagina__cabecalho">
    <h1 class="pagina__titulo" th:text="${modulo.titulo}">Módulo</h1>

    <form class="busca-crud"
          method="get"
          th:action="${modulo.urlAcao}"
          role="search"
          aria-label="Filtros">
      <div class="filtros-crud">
        <th:block th:each="f : ${modulo.filtros}">
          <th:block th:replace="~{fragments/filters :: ${f.nomeFragmento()}(${f}, ${parametros})}"></th:block>
        </th:block>

        <div class="filtro-crud filtro-crud--acoes">
          <button class="busca-crud__botao" type="submit">Pesquisar</button>
        </div>
      </div>
    </form>
  </header>

  <section class="cartao-crud">
    <div class="alerta-formulario alerta-formulario--sucesso"
         th:if="${sucesso != null}"
         th:text="${sucesso}"></div>

    <div class="vazio-crud"
         th:if="${linhas == null or #lists.isEmpty(linhas)}">
      <div class="vazio-crud__titulo">Nenhum registro encontrado</div>
      <div class="vazio-crud__texto">Tente ajustar os filtros.</div>
    </div>

    <div class="tabela-crud-wrap"
         th:if="${linhas != null and !#lists.isEmpty(linhas)}">
      <table class="tabela-crud" aria-label="Tabela do módulo">
        <thead class="tabela-crud__cabecalho">
        <tr class="tabela-crud__linha">
          <th class="tabela-crud__coluna"
              th:each="c : ${modulo.colunas}"
              th:text="${c.cabecalho}">
            Coluna
          </th>
          <th class="tabela-crud__coluna" th:if="${modulo.chave == 'pedidos'}">Ações</th>
        </tr>
        </thead>

        <tbody class="tabela-crud__corpo">
        <tr class="tabela-crud__linha" th:each="row : ${linhas}">
          <td class="tabela-crud__celula"
              th:each="c : ${modulo.colunas}"
              th:text="${row[c.campo]}">
            valor
          </td>
          <td class="tabela-crud__celula" th:if="${modulo.chave == 'pedidos'}">
            <div class="acoes-tabela">
              <a class="acoes-tabela__botao acoes-tabela__botao--visualizar"
                 th:href="@{/pedidos/{id}/visualizar(id=${row['id_pedido']})}">
                Visualizar
              </a>
              <a class="acoes-tabela__botao acoes-tabela__botao--pdf"
                 th:href="@{/pedidos/{id}/pdf(id=${row['id_pedido']})}"
                 target="_blank"
                 rel="noopener">
                PDF
              </a>
              <a class="acoes-tabela__botao acoes-tabela__botao--editar"
                 th:href="@{/pedidos/{id}/editar(id=${row['id_pedido']})}">
                Editar
              </a>
              <form method="post"
                    th:action="@{/pedidos/{id}/excluir(id=${row['id_pedido']})}"
                    onsubmit="return confirm('Tem certeza que deseja excluir este pedido?');">
                <button class="acoes-tabela__botao acoes-tabela__botao--excluir" type="submit">
                  Excluir
                </button>
              </form>
            </div>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </section>

</section>

</body>
</html>
