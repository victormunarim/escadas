<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Entrar - Sistema de Escadas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-pagina">
<main class="login-container">
    <section class="login-cartao">
        <a class="marca login-marca" href="/" aria-label="Página inicial">
            <span class="marca__simbolo">E</span>
            <span class="marca__texto">
                <span class="marca__titulo">Escadas Munarim</span>
                <span class="marca__subtitulo">Acesso ao sistema</span>
            </span>
        </a>

        <div id="login-erro" class="login-alerta login-alerta--erro" hidden>
            Usuário ou senha inválidos.
        </div>
        <div id="login-ok" class="login-alerta login-alerta--ok" hidden>
            Login realizado com sucesso.
        </div>

        <form id="login-form" class="login-formulario" action="#" method="post" novalidate>

            <label class="login-label" for="username">Usuário</label>
            <input class="login-input" id="username" name="username" type="text" autocomplete="username" required autofocus>

            <label class="login-label" for="senha">Senha</label>
            <input class="login-input" id="senha" name="senha" type="password" autocomplete="current-password" required>

            <button class="login-botao" type="submit">Acessar</button>
        </form>
    </section>
</main>
<script>
    const form = document.getElementById('login-form');
    const erro = document.getElementById('login-erro');
    const ok = document.getElementById('login-ok');

    form.addEventListener('submit', async (event) => {
        event.preventDefault();
        erro.hidden = true;
        ok.hidden = true;

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('senha').value;

        try {
            const response = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password }),
                credentials: 'same-origin'
            });

            if (!response.ok) {
                erro.hidden = false;
                return;
            }

            await response.json();

            ok.hidden = false;
            window.location.href = '/';
        } catch (e) {
            erro.hidden = false;
        }
    });
</script>
</body>
</html>
