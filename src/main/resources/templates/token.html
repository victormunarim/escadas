<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::section})}">
<section class="pagina">
    <header class="pagina__cabecalho">
        <h1 class="pagina__titulo">Google Drive</h1>
        <p class="pagina__subtitulo">Conecte a conta única para envio de arquivos.</p>
    </header>

    <section class="cartao-crud">
        <div class="alerta-formulario alerta-formulario--sucesso"
             th:if="${sucesso != null}"
             th:text="${sucesso}"></div>

        <div class="alerta-formulario alerta-formulario--erro"
             th:if="${erro != null}"
             th:text="${erro}"></div>

        <div class="formulario-crud">
            <div>
                <strong>Status:</strong>
                <span th:if="${tokenConfigurado}">Token configurado</span>
                <span th:unless="${tokenConfigurado}">Token não configurado</span>
            </div>
            <div>
                <strong>Nome:</strong>
                <span th:text="${nomeToken}">google_drive</span>
            </div>

            <div class="formulario-crud__acoes">
                <a class="acoes-tabela__botao acoes-tabela__botao--editar"
                   th:href="@{/oauth/google/start}">
                    Conectar Google Drive
                </a>
            </div>
        </div>

        <form class="formulario-crud formulario-crud--separado"
              method="post"
              th:action="@{/token/credenciais}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="formulario-crud__grade">
                <label class="filtro-crud campo">
                    <span class="filtro-crud__rotulo">Client ID</span>
                    <input class="filtro-crud__entrada"
                           type="text"
                           name="clientId"
                           th:value="${clientId}"
                           required>
                </label>
                <label class="filtro-crud campo">
                    <span class="filtro-crud__rotulo">Project ID</span>
                    <input class="filtro-crud__entrada"
                           type="text"
                           name="projectId"
                           th:value="${projectId}"
                           required>
                </label>
                <label class="filtro-crud campo">
                    <span class="filtro-crud__rotulo">Client Secret</span>
                    <input class="filtro-crud__entrada"
                           type="password"
                           name="clientSecret"
                           autocomplete="new-password">
                </label>
                <label class="filtro-crud campo">
                    <span class="filtro-crud__rotulo">Parent Folder ID</span>
                    <input class="filtro-crud__entrada"
                           type="text"
                           name="parentFolder"
                           th:value="${parentFolder}"
                           required>
                </label>
            </div>
            <div class="formulario-crud__acoes">
                <div>
                    <strong>Credenciais:</strong>
                    <span th:if="${credenciaisConfiguradas}">Configuradas</span>
                    <span th:unless="${credenciaisConfiguradas}">Não configuradas</span>
                </div>
                <button class="busca-crud__botao" type="submit">Salvar credenciais</button>
            </div>
        </form>
    </section>
</section>
</html>
