events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout 65;

    # Zonas de Rate Limiting por IP do cliente
    limit_req_zone $binary_remote_addr zone=limite_geral:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=limite_login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=limite_api:10m rate=30r/m;
    limit_conn_zone $binary_remote_addr zone=limite_conexoes:10m;

    # Bloqueio de User-Agents maliciosos e robôs de varredura automatizada
    map $http_user_agent $bad_bot {
        default 0;
        ~*(sqlmap|nikto|netsparker|nmap|masscan|zgrab|censys|shodan|dirbuster|gobuster|wpscan|hydra|medusa) 1;
        ~*(Python-urllib|curl/|Wget/|Go-http-client|Java/) 1;
    }

    server {
        listen 80;
        server_name localhost;

        # Bloqueia robôs maliciosos
        if ($bad_bot = 1) {
            return 403;
        }

        # Limite global de conexões simultâneas por IP
        limit_conn limite_conexoes 20;

        # Cabeçalhos de Segurança HTTP
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Proteção e Rate Limiting específico para Rota de Login
        location /login {
            limit_req zone=limite_login burst=3 nodelay;
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        }

        # Proteção e Rate Limiting para Endpoints de API
        location /api/ {
            limit_req zone=limite_api burst=10 nodelay;
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        }

        # Demais rotas estáticas e da aplicação
        location / {
            limit_req zone=limite_geral burst=20 nodelay;
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        }
    }
}
