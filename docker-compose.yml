services:
  nginx:
    image: nginx:alpine
    container_name: escadas-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: always

  app:
    build: .
    container_name: escadas-app
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_GENERATE_DDL=true
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/escadas?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - PROJETO_JWTSECRET=ed8HPm4u1DO3OSJk9hixWR38Z/e4vfNtHg/hnhAJ8sfvnw3G+k/pr2Sz0IgIbzDRyIzeTgoQqqFZRsE+T2OQUg==
    depends_on:
      db:
        condition: service_healthy
    restart: always

  db:
    image: mysql:8.0
    container_name: escadas-db
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=escadas
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

volumes:
  db_data:
